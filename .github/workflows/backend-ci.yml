name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: watchmyai
          POSTGRES_USER: watchmyai
          POSTGRES_PASSWORD: watchmyai
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U watchmyai -d watchmyai"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Test
        run: ./gradlew test --no-daemon
        env:
          REDIS_URL: redis://localhost:6379
