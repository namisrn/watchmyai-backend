services:
  postgres:
    image: postgres:16
    container_name: watchmyai-postgres
    environment:
      POSTGRES_DB: watchmyai
      POSTGRES_USER: watchmyai
      POSTGRES_PASSWORD: watchmyai
    ports:
      - "5432:5432"
    volumes:
      - watchmyai-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: watchmyai-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - watchmyai-redis-data:/data

volumes:
  watchmyai-postgres-data:
  watchmyai-redis-data:
