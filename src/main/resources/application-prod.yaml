server:
  tomcat:
    max-http-form-post-size: 65536
    max-swallow-size: 65536

spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 5000
      idle-timeout: 300000
      max-lifetime: 1200000
      keepalive-time: 60000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: validate

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
      show-components: never
  metrics:
    tags:
      application: watchmyai-backend
  prometheus:
    metrics:
      export:
        enabled: true
  health:
    db:
      enabled: true
    redis:
      enabled: true
    diskspace:
      enabled: false

watchmyai:
  debug:
    endpoints-enabled: false
  auth:
    apple:
      audience: ${APPLE_CLIENT_ID:}
