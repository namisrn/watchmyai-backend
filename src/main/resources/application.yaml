spring:
  application:
    name: watchmyai-backend

  profiles:
    default: dev

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

watchmyai:
  debug:
    endpoints-enabled: false
  auth:
    apple:
      issuer: https://appleid.apple.com
      jwks-url: https://appleid.apple.com/auth/keys
      audience: ${APPLE_CLIENT_ID:}
