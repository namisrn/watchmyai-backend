spring:
  application:
    name: watchmyai-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/watchmyai
    username: watchmyai
    password: watchmyai

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true