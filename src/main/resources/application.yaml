spring:
  application:
    name: watchmyai-backend

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

watchmyai:
  debug:
    endpoints-enabled: false
  auth:
    apple:
      issuer: https://appleid.apple.com
      jwks-url: https://appleid.apple.com/auth/keys
      # Ohne Audience schlagen alle Bearer-Anfragen (iPhone + Watch) fehl. Auf dem VPS war
      # APPLE_CLIENT_ID oft unset ‚Äî Default = App-Bundle + WatchKit-Extension (JWT aud).
      # √úberschreiben: APPLE_CLIENT_ID=com.sasanrafatnami.WatchMyAI[,weitere]
      audience: ${APPLE_CLIENT_ID:com.sasanrafatnami.WatchMyAI,com.sasanrafatnami.WatchMyAI.watchkitapp}
  session:
    ttl-days: ${WATCHMYAI_SESSION_TTL_DAYS:30}
  legal:
    contact-email: ${WATCHMYAI_LEGAL_CONTACT_EMAIL:support@watchmyai.app}
  plan-catalog:
    # Limits & cost-caps tuned for Year-1 profitability under Apple's 30% cut.
    # Worst-case marge after 30% Apple fee:
    #   PLUS  $2.99 ‚âà ‚Ç¨2.75 brutto ‚Üí ‚Ç¨1.92 netto, max cost ‚Ç¨1.20 ‚Üí ~37% margin
    #   PRO   $5.99 ‚âà ‚Ç¨5.51 brutto ‚Üí ‚Ç¨3.86 netto, max cost ‚Ç¨2.80 ‚Üí ~27% margin
    # Monthly limits sit well above the P95 expected usage for a watchOS Q&A
    # assistant, so no real user will feel them ‚Äî only abuse paths are bounded.
    plans:
      FREE:
        lifetime-request-limit: 0
        daily-request-limit: 5
        monthly-request-limit: 20
        monthly-premium-request-limit: 0
        max-output-tokens: 180
        monthly-cost-cap-eur: 0.10
      PLUS:
        lifetime-request-limit: 0
        daily-request-limit: 60
        monthly-request-limit: 500
        monthly-premium-request-limit: 0
        max-output-tokens: 300
        monthly-cost-cap-eur: 1.20
      PRO:
        lifetime-request-limit: 0
        daily-request-limit: 150
        monthly-request-limit: 1000
        monthly-premium-request-limit: 60
        max-output-tokens: 400
        monthly-cost-cap-eur: 2.80
  ai:
    model-policy:
      default-model: gpt-5.4-mini
      pro-premium-model: gpt-5.4
      mode-models:
        translate: gpt-5.4-nano
        rewrite: gpt-5.4-nano
        explain: gpt-5.4-mini
        short_answer: gpt-5.4-mini
        premium_reasoning: gpt-5.4-mini
    pricing:
      usd-to-eur: ${WATCHMYAI_USD_TO_EUR:0.92}
      default-model: gpt-5.4-mini
      models:
        gpt-5.4-nano:
          input-usd-per-million: 0.20
          output-usd-per-million: 1.25
        gpt-5.4-mini:
          input-usd-per-million: 0.75
          output-usd-per-million: 4.50
        gpt-5.4:
          input-usd-per-million: 2.50
          output-usd-per-million: 15.00
        gpt-5.5:
          input-usd-per-million: 5.00
          output-usd-per-million: 30.00
